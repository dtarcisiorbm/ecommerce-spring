# Exemplos de Configurações por Ambiente
# Este arquivo é apenas para documentação - não é usado pelo Spring

# ========================================
# COMO USAR OS PROFILES
# ========================================

# 1. Desenvolvimento (Padrão)
# ./mvnw spring-boot:run
# OU
# java -jar target/backend.jar
# Usa: application.properties

# 2. Teste
# ./mvnw spring-boot:run -Dspring-boot.run.profiles=test
# OU
# java -jar -Dspring.profiles.active=test target/backend.jar
# Usa: application-test.properties

# 3. Produção
# ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
# OU
# java -jar -Dspring.profiles.active=prod target/backend.jar
# Usa: application-prod.properties

# ========================================
# DIFERENÇAS PRINCIPAIS
# ========================================

# DESENVOLVIMENTO (application.properties):
# - show-sql: true (SQL visível no console)
# - ddl-auto: update (atualiza schema automaticamente)
# - logging: DEBUG (logs detalhados)
# - cache: none (sem cache)
# - rate-limiting: 1000 req/min (limites altos)
# - devtools: enabled (restart automático)

# TESTE (application-test.properties):
# - show-sql: false (SQL oculto)
# - ddl-auto: create-drop (cria e destroi schema)
# - logging: WARN/INFO (logs mínimos)
# - cache: redis com TTL curto (5 min)
# - rate-limiting: 500 req/min
# - stripe: chaves de teste

# PRODUÇÃO (application-prod.properties):
# - show-sql: false (SQL oculto)
# - ddl-auto: validate (valida schema apenas)
# - logging: WARN/INFO (logs mínimos)
# - cache: redis com TTL longo (60 min)
# - rate-limiting: 100 req/min (limites baixos)
# - ssl/tls: habilitado (opcional)
# - monitoring: endpoints expostos

# ========================================
# VARIÁVEIS DE AMBIENTE
# ========================================

# As variáveis são lidas dos arquivos .env:
# - .env.dev (desenvolvimento)
# - .env.test (teste)
# - .env.prod (produção)

# Script de setup:
# ./scripts/setup-env.sh dev
# ./scripts/setup-env.sh test
# ./scripts/setup-env.sh prod

# ========================================
# EXEMPLOS DE USO
# ========================================

# Setup rápido para desenvolvimento:
source .env.dev && ./mvnw spring-boot:run

# Deploy em produção:
./scripts/setup-env.sh prod && ./mvnw clean package -Pprod
java -jar -Dspring.profiles.active=prod target/backend.jar

# Testes automatizados:
./scripts/setup-env.sh test && ./mvnw test -Dspring.profiles.active=test
