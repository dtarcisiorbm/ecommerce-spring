# Configurações de Teste
# Uso: java -jar -Dspring.profiles.active=test backend.jar

# Configurações da Aplicação
spring.application.name=backend-test
server.port=${SERVER_PORT:8080}

# Banco de Dados PostgreSQL (Teste)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce_test}
spring.datasource.username=${DB_USERNAME:test_user}
spring.datasource.password=${DB_PASSWORD:test_password}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=1000ms
spring.redis.lettuce.pool.max-active=5
spring.redis.lettuce.pool.max-idle=5
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# Logging
logging.level.root=WARN
logging.level.com.ecommerce=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/backend-test.log
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=5

# Segurança
api.security.token.secret=${JWT_SECRET:test-secret-key-32-chars-testing-environment}
api.security.token.expiration=3600000

# Rate Limiting
rate.limit.enabled=true
rate.limit.requests-per-minute=500
rate.limit.capacity=1000

# Stripe (Pagamento - ambiente de teste)
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_1234567890123456}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_test_1234567890123456}

# Email (Configuração de teste)
spring.mail.host=${EMAIL_HOST:localhost}
spring.mail.port=${EMAIL_PORT:1025}
spring.mail.username=${EMAIL_USERNAME:test@localhost}
spring.mail.password=${EMAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=false
management.info.env.enabled=true

# Performance
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=2
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=test-task-

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Testes
spring.test.database.replace=none
spring.jpa.defer-datasource-initialization=true

# Validações
spring.mvc.validation.skip-invalid-resultset-bean=true

# Dados de Teste (Opcional)
test.data.initialization.enabled=true
test.data.cleanup.after-test=true
